<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@1.0.4/css/bulma.min.css">
<body style="width:100vw;height:100vh;margin:0;padding:0">
<script src="/node_modules/@ruffle-rs/ruffle/ruffle.js"></script>
<script>
function dataURLtoBlobURL(dataURL){
  try {
    var byteString = atob(dataURL.split(',')[1]);
    var mime = dataURL.split(',')[0].split(':')[1].split(';')[0];
    var ab = new ArrayBuffer(byteString.length);
    var ia = new Uint8Array(ab);
    for (var i = 0; i < byteString.length; i++){
      ia[i] = byteString.charCodeAt(i);
    }
    var blob = new Blob([ab], {
      type : mime
    });
    return URL.createObjectURL(blob);
  } catch (error) {
    alert('Failed to convert data URL to Blob URL');
    console.error('Failed to convert data URL to Blob URL:', error);
  }
}

var currentObjectURL = null;

function mountSwf(src){
  var existingEmbed = document.getElementById('plugin');
  if (existingEmbed) {
    existingEmbed.remove();
  }
  var embed = document.createElement('embed');
  embed.width = '100%';
  embed.height = '100%';
  embed.name = 'plugin';
  embed.id = 'plugin';
  embed.type = 'application/x-shockwave-flash';
  embed.src = src;
  document.body.appendChild(embed);
}

const urlParams = new URLSearchParams(window.location.search);
const swfPath = urlParams.get('swf');
const channel = urlParams.get('channel');

if (swfPath) {
  document.title = swfPath.split('/').pop();
  mountSwf(swfPath);
} else {
  const activeChannel = channel || 'swf_channel';
  document.title = activeChannel;

  const bc = new BroadcastChannel(activeChannel);
  bc.onmessage = (event) => {
      var eventType = (event.data.type);
      var eventData = (event.data.data);
      
     if (eventType == 'swf') {
      var dataURL = eventData;
      var blobURL = dataURLtoBlobURL(dataURL);
      if (!blobURL) {
        return;
      }
      if (currentObjectURL) {
        URL.revokeObjectURL(currentObjectURL);
      }
      currentObjectURL = blobURL;
      mountSwf(blobURL);
      bc.postMessage({type: 'close'});
      bc.close();
     }
      
     if (eventType == 'close') {
     bc.close();
     }
  };
}

window.addEventListener('beforeunload', function(){
  if (currentObjectURL) {
    URL.revokeObjectURL(currentObjectURL);
    currentObjectURL = null;
  }
});
</script>
</body>
