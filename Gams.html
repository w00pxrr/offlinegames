<body>
<noscript>
<style>
body > * {
display: none !important;
}

.no-js-message {
display: block !important;
}
</style>
<div class="no-js-message">Enable JavaScript</div>

<section class="section">
<div class="container is-max-desktop">
<div class="hero">
<h1 class="title">Gams - Forked by w00pxrr</h1>
<p class="subtitle">Pick a game, star your favorites, and launch instantly in your preferred mode.</p>
</div>

<div class="top-panel box">
<div class="columns is-variable is-4 is-vcentered">
<div class="column">
<div class="field is-grouped is-grouped-multiline">
<div class="control">
<span class="control-label">Dark Mode</span>
<label class="switch">
<input id="darkModeInput" type="checkbox" checked>
<span class="slider round"></span>
</label>
</div>

<div class="control">
<span class="control-label">Open Gam Mode</span>
<div class="select is-medium">
<select id='gamMode' aria-label="Open game mode">
<option value="gam">In new tab</option>
<option value="embed" selected>On this tab</option>
<option value="blank">In an about:blank tab</option>
<option value="direct">Replace this tab</option>
<option value="raw">Raw link in new tab</option>
</select>
</div>
</div>
</div>
</div>

<div class="column">
<div class="status-row">
<p class="total-games">Total Games: <span class="tag is-link is-light is-medium" id="totalGames">Loading...</span></p>
<a class="report-link button is-link is-light" href="https://github.com/w00pxrr/w00pxrr.github.io">Found a bug? Report it here</a>
</div>
</div>
</div>
</div>

<div class="overlay" id="overlay" style="display:none">
<div class="shade" id="shade"></div>
<div class="cont" id="cont">
<a id="newWin" title="Open in new window" target="_blank" rel="noopener noreferrer">&#8599;</a>
<iframe style="width:100%;height:100%;border-radius:10px" id="mainGam" title="Embedded game player"></iframe>

<div class='loader' id='loader'></div>
</div>
</div>


<div id="contain">


<a href="Settings.html" class="tile card">
<div class="card-image"><figure class="image is-square"><img alt="settings" class="img" src="img/gams-g.png" width="253" height="253" fetchpriority="high" decoding="async"></figure></div>
<div class="card-content"><span class="name">Settings</span></div>
</a>
<a href="g/about.html" class="tile card">
<div class="card-image"><figure class="image is-square"><img alt="about" class="img" src="img/gams-g.png" width="253" height="253" fetchpriority="high" decoding="async"></figure></div>
<div class="card-content"><span class="name">About</span></div>
</a>

</div>

<div id="searcher">
<button id="searchToggle" class="search-toggle button is-rounded is-light" type="button" aria-label="Open search">&#128269;</button>
</div>

<div id="cookieConsent" class="cookie-consent hidden" role="dialog" aria-label="Cookie preferences">
<p class="cookie-title">Cookie Preferences</p>
<p class="cookie-text">Choose whether to allow analytics cookies and settings cookies.</p>
<div class="cookie-options">
<label class="cookie-option"><input id="consentSettings" type="checkbox" checked>Settings cookies</label>
<label class="cookie-option"><input id="consentAnalytics" type="checkbox">Analytics cookies</label>
</div>
<div class="cookie-actions">
<button id="consentAcceptAll" class="button is-link is-small" type="button">Accept all</button>
<button id="consentSave" class="button is-light is-small" type="button">Save choices</button>
<button id="consentRejectAll" class="button is-small" type="button">Reject all</button>
</div>
</div>
</div>
</section>

</script>
