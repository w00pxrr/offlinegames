<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">


<link type="image/x-icon" rel="icon" href="img/gams-g.png">
 <link rel="preload" href="https://cdn.jsdelivr.net/npm/bulma@1.0.4/css/bulma.min.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
<noscript><link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@1.0.4/css/bulma.min.css"></noscript>
  <link rel = "preload" href = "assets/gams.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
  <noscript><link rel="stylesheet" href="assets/gams.css"></noscript>
  <!-- Primary Meta Tags -->
  <title>LearningArcade</title>
  <meta name="title" content="LearningArcade">
  <meta name="description" content="LearningArcade is an awesome unblocked games website for schools with educational games and we have over 74 games!">
  
  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="w00pxrr.github.io/Gams.html">
  <meta property="og:title" content="Gams">
  <meta property="og:description" content="Gams is an awesome unblocked games website for schools with educational games and we have over 74 games!">
  <meta property="og:image" content="Gams.png">
  
  <!-- Twitter -->
  <meta property="twitter:card" content="summary_large_image">
  <meta property="twitter:url" content="w00pxrr.github.io/Gams.html">
  <meta property="twitter:title" content="Gams">
  <meta property="twitter:description" content="Gams is an awesome unblocked games website for schools with educational games and we have over 74 games!">
  <meta property="twitter:image" content="Gams.png">
  
  <!-- Optional Meta Tags -->
  <meta name="keywords" content="unblocked games, unblocked, games, coolmathgames, free games, flash games, ruffle, retro games, mario 64, run 3, run 2, run, bloxorz">
  <meta name="robots" content="index, follow">
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">

</head>

<body>
<noscript>
<style>
body > * {
display: none !important;
}

.no-js-message {
display: block !important;
}
</style>
<div class="no-js-message">Enable JavaScript</div>
</noscript>

<!-- Full-width Hero Section -->
<section class="hero is-large is-primary has-background-gradient">
  <div class="hero-body">
    <div class="container">
      <h1 class="title is-1">LearningArcade</h1>
      <p class="subtitle is-3">Fun educational games for schools</p>
    </div>
  </div>
</section>

<!-- Navigation Bar -->
<nav class="navbar is-fixed-top is-dark" role="navigation" aria-label="main navigation">
  <div class="navbar-brand">
    <a class="navbar-item" href="#"></a>
  </div>

  <div id="navbarBasicExample" class="navbar-menu">
    <div class="navbar-start">
      <a class="navbar-item" href="#categories">Categories</a>
      <a class="navbar-item" href="#games">Games</a>
      <a class="navbar-item" href="Settings.html">Settings</a>
      <a class="navbar-item" href="games/about.html">About</a>
    </div>

    <div class="navbar-end">
      <div class="navbar-item">
        <div class="field is-grouped">
          <p class="control">
            <span class="control-label">Dark Mode</span>
            <label class="switch">
              <input id="darkModeInput" type="checkbox" checked>
              <span class="slider round"></span>
            </label>
          </p>
          <p class="control">
            <span class="control-label">Mode</span>
            <div class="select is-small">
              <select id='gamMode' aria-label="Open game mode">
                <option value="gam">New Tab</option>
                <option value="embed" selected>Embed</option>
                <option value="blank">Blank</option>
                <option value="direct">Replace</option>
                <option value="raw">Raw</option>
              </select>
            </div>
        </div>
      </div>
    </div>
  </div>
</nav>

<!-- Search Bar -->
<section class="section">
  <div class="container">
    <div class="field">
      <div class="control">
        <label for="searchInput"></label><input class="input is-large" type="text" placeholder="Search games..." id="searchInput">
      </div>
    </div>
  </div>
</section>

<!-- Categories Section -->
<section id="categories" class="section">
  <div class="container">
    <h2 class="title is-2">Categories</h2>
    <div class="buttons">
      <button class="button is-primary category-btn" data-category="all">All</button>
      <button class="button is-light category-btn" data-category="favorites">Favorites</button>
      <button class="button is-light category-btn" data-category="action">Action</button>
      <button class="button is-light category-btn" data-category="puzzle">Puzzle</button>
      <button class="button is-light category-btn" data-category="adventure">Adventure</button>
      <button class="button is-light category-btn" data-category="sports">Sports</button>
      <button class="button is-light category-btn" data-category="tools">Tools</button>
      <button class="button is-light category-btn" data-category="runner">Runner</button>
    </div>
  </div>
</section>

<!-- Recommended Section -->
<section id="recommended-section" class="section" style="display: none;">
  <div class="container">
    <h2 class="title is-2">Recommended For You</h2>
    <div class="columns is-multiline" id="recommended-container">
      <!-- Recommended games will be loaded here -->
    </div>
  </div>
</section>

<!-- Games Grid -->
<section id="games" class="section">
  <div class="container is-fluid">
    <div class="columns is-multiline" id="contain">
      <!-- Games will be loaded here by JS -->
    </div>
  </div>
</section>

<!-- Overlay for embedded games -->
<div class="overlay" id="overlay" style="display:none">
  <div class="shade" id="shade"></div>
  <div class="cont" id="cont">
    <a id="newWin" title="Open in new window" target="_blank" rel="noopener noreferrer">&#8599;</a>
    <iframe style="width:100%;height:100%;border-radius:10px" id="mainGam" title="Embedded game player"></iframe>
    <div class='loader' id='loader'></div>
  </div>
</div>

<!-- Footer -->
<footer class="footer">
  <div class="content has-text-centered">
    <p>Total Games: <span class="tag is-link is-light is-medium" id="totalGames">Loading...</span></p>
    <p><a class="button is-link is-light" href="https://github.com/w00pxrr/w00pxrr.github.io">Found a bug? Report it here</a></p>
  </div>
</footer>

<!-- Cookie Consent -->
<div id="cookieConsent" class="cookie-consent hidden" role="dialog" aria-label="Cookie preferences">
  <p class="cookie-title">Cookie Preferences</p>
  <p class="cookie-text">Choose whether to allow analytics cookies and settings cookies.</p>
  <div class="cookie-options">
    <label class="cookie-option"><input id="consentSettings" type="checkbox" checked>Settings cookies</label>
    <label class="cookie-option"><input id="consentAnalytics" type="checkbox">Analytics cookies</label>
  </div>
  <div class="cookie-actions">
    <button id="consentAcceptAll" class="button is-link is-small" type="button">Accept all</button>
    <button id="consentSave" class="button is-light is-small" type="button">Save choices</button>
    <button id="consentRejectAll" class="button is-small" type="button">Reject all</button>
  </div>
</div>

<script defer src="assets/gams.js">

</script>
</body>
</html>
