<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chess Game</title>
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
        }
        #board {
            margin: 20px auto;
            width: 400px;
            height: 400px;
        }
        #mode-selection {
            margin: 20px;
        }
        button {
            margin: 5px;
            padding: 10px 20px;
            font-size: 16px;
        }
        #status {
            margin: 20px;
            font-size: 18px;
        }
        .text-align-center {
            text-align: center;
        }
        #myBoard {
            max-width: 100%;
            height: auto;
            overflow: scroll;
        }
        .highlight-white {
            box-shadow: inset 0 0 3px 3px yellow;
        }
        .highlight-black {
            box-shadow: inset 0 0 3px 3px blue;
        }
        .highlight-hint {
            box-shadow: inset 0 0 3px 3px red;
        }
        .no-underline {
            text-decoration: none;
        }
        .no-outline:focus {
            outline: none;
            box-shadow: none;
        }
        .btn-header {
            font-size: 20px;
            font-weight: bold;
        }
        /* Chessboard.js styles */
        .chessboard {
            border: 2px solid #404040;
            margin: 0 auto;
        }
        .chessboard .square-55d63 {
            width: 12.5%;
            height: 12.5%;
            float: left;
            position: relative;
        }
        .chessboard .square-55d63:nth-child(odd) {
            background-color: #f0d9b5;
        }
        .chessboard .square-55d63:nth-child(even) {
            background-color: #b58863;
        }
        .chessboard .square-55d63.black-3c85d:nth-child(odd) {
            background-color: #b58863;
        }
        .chessboard .square-55d63.black-3c85d:nth-child(even) {
            background-color: #f0d9b5;
        }
        .chessboard .square-55d63 .piece-417db {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            background-size: cover;
        }
    </style>
</head>
<body>

        <button id="human-mode">Human Mode (Human vs Human)</button>

    <div id="board"></div>
    <div id="status">Select a mode to start.</div>
    <div id="stats">AI Wins: <span id="ai-wins">0</span> | AI Losses: <span id="ai-losses">0</span></div>
    <div id="controls" style="display: none;">
        <button id="undo">Undo</button>
        <button id="redo">Redo</button>
        <button id="reset">Reset</button>
    </div>

          n: [-66, -53, -75, -75, -10, -55, -58, -70, -3, -6, 100, -36, 4, 62, -4, -14, 10, 67, 1, 74, 73, 27, 62, -2, 24, 24, 45, 37, 33, 41, 25, 17, -1, 5, 31, 21, 22, 35, 2, 0, -18, 10, 13, 22, 18, 15, 11, -14, -23, -15, 2, 0, 2, 0, -23, -20, -74, -23, -26, -24, -19, -35, -22, -69],
          b: [-59, -78, -82, -76, -23, -107, -37, -50, -11, 20, 35, -42, -39, 31, 2, -22, -9, 39, -32, 41, 52, -10, 28, -14, 25, 17, 20, 34, 26, 25, 15, 10, 13, 10, 17, 23, 17, 16, 0, 7, 14, 25, 24, 15, 8, 25, 20, 15, 19, 20, 11, 6, 7, 6, 20, 16, -7, 2, -15, -12, -14, -15, -10, -10],
          r: [35, 29, 33, 4, 37, 33, 56, 50, 55, 29, 56, 67, 55, 62, 34, 60, 19, 35, 28, 33, 45, 27, 25, 15, 0, 5, 16, 13, 18, -4, -9, -6, -28, -35, -16, -21, -13, -29, -46, -30, -42, -28, -42, -25, -25, -35, -26, -46, -53, -38, -31, -26, -29, -43, -44, -53, -30, -24, -18, 5, -2, -18, -31, -32],
          q: [6, 1, -8, -104, 69, 24, 88, 26, 14, 32, 60, -10, 20, 76, 57, 24, -2, 43, 32, 60, 72, 63, 43, 2, 1, -16, 22, 17, 25, 20, -13, -6, -14, -15, -2, -5, -1, -10, -20, -22, -30, -6, -13, -11, -16, -11, -16, -27, -36, -18, 0, -19, -15, -15, -21, -38, -39, -30, -31, -13, -31, -36, -34, -42],
          k: [4, 54, 47, -99, -99, 60, 83, -62, -32, 10, 55, 56, 56, 55, 10, 3, -62, 12, -57, 44, -67, 28, 37, -31, -55, 50, 11, -4, -19, 13, 0, -49, -55, -43, -52, -28, -51, -47, -8, -50, -47, -42, -43, -79, -64, -32, -29, -32, -4, 3, -14, -50, -57, -18, 13, 4, 17, 30, -3, -14, 6, -1, 40, 18],
          k_e: [-50, -40, -30, -20, -20, -30, -40, -50, -30, -20, -10, 0, 0, -10, -20, -30, -30, -10, 20, 30, 30, 20, -10, -30, -30, -10, 30, 40, 40, 30, -10, -30, -30, -10, 30, 40, 40, 30, -10, -30, -30, -10, 20, 30, 30, 20, -10, -30, -30, -30, 0, 0, 0, 0, -30, -30, -50, -30, -30, -30, -30, -30, -30, -50]
        };
        var pst_b = {
          p: pst_w['p'].slice().reverse(),
          n: pst_w['n'].slice().reverse(),
          b: pst_w['b'].slice().reverse(),
          r: pst_w['r'].slice().reverse(),
          q: pst_w['q'].slice().reverse(),
          k: pst_w['k'].slice().reverse(),
          k_e: pst_w['k_e'].slice().reverse(),
        };

        var pstOpponent = { w: pst_b, b: pst_w };
        var pstSelf = { w: pst_w, b: pst_b };

        function evaluateBoard(game, move, prevSum, color) {
          if (game.in_checkmate()) {
            if (move.color === color) {
              return 10 ** 10;
            } else {
              return -(10 ** 10);
            }
          }
          if (game.in_draw() || game.in_threefold_repetition() || game.in_stalemate()) {
            return 0;
          }
          if (game.in_check()) {
            if (move.color === color) {
              prevSum += 50;
            } else {
              prevSum -= 50;
            }
          }
          var from = [8 - parseInt(move.from[1]), move.from.charCodeAt(0) - 'a'.charCodeAt(0)];
          var to = [8 - parseInt(move.to[1]), move.to.charCodeAt(0) - 'a'.charCodeAt(0)];
          if (prevSum < -1500) {
            if (move.piece === 'k') {
              move.piece = 'k_e';
            }
          }
          if ('captured' in move) {
            if (move.color === color) {
              prevSum += weights[move.captured] + pstOpponent[move.color][move.captured][to[0]][to[1]];
            } else {
              prevSum -= weights[move.captured] + pstSelf[move.color][move.captured][to[0]][to[1]];
            }
          }
          if (move.flags.includes('p')) {
            move.promotion = 'q';
            if (move.color === color) {
              prevSum -= weights[move.piece] + pstSelf[move.color][move.piece][from[0]][from[1]];
              prevSum += weights[move.promotion] + pstSelf[move.color][move.promotion][to[0]][to[1]];
            } else {
              prevSum += weights[move.piece] + pstSelf[move.color][move.piece][from[0]][from[1]];
              prevSum -= weights[move.promotion] + pstSelf[move.color][move.promotion][to[0]][to[1]];
            }
          } else {
            if (move.color !== color) {
              prevSum += pstSelf[move.color][move.piece][from[0]][from[1]];
              prevSum -= pstSelf[move.color][move.piece][to[0]][to[1]];
            } else {
              prevSum -= pstSelf[move.color][move.piece][from[0]][from[1]];
              prevSum += pstSelf[move.color][move.piece][to[0]][to[1]];
            }
          }
          return prevSum;
        }

        function minimax(game, depth, alpha, beta, isMaximizingPlayer, sum, color) {
          var children = game.ugly_moves({ verbose: true });
          children.sort(function (a, b) { return 0.5 - Math.random(); });
          var currMove;
          if (depth === 0 || children.length === 0) {
            return [null, sum];
          }
          var maxValue = Number.NEGATIVE_INFINITY;
          var minValue = Number.POSITIVE_INFINITY;
          var bestMove;
          for (var i = 0; i < children.length; i++) {
            currMove = children[i];
            var currPrettyMove = game.ugly_move(currMove);
            var newSum = evaluateBoard(game, currPrettyMove, sum, color);
            var [childBestMove, childValue] = minimax(game, depth - 1, alpha, beta, !isMaximizingPlayer, newSum, color);
            game.undo();
            if (isMaximizingPlayer) {
              if (childValue > maxValue) {
                maxValue = childValue;
                bestMove = currPrettyMove;
              }
              if (childValue > alpha) {
                alpha = childValue;
              }
            } else {
              if (childValue < minValue) {
                minValue = childValue;
                bestMove = currPrettyMove;
              }
              if (childValue < beta) {
                beta = childValue;
              }
            }
            if (alpha >= beta) {
              break;
            }
          }
          if (isMaximizingPlayer) {
            return [bestMove, maxValue];
          } else {
            return [bestMove, minValue];
          }
        }

        function getBestMove(game, color, currSum) {
          var depth = 3; // fixed depth
          var d = new Date().getTime();
          var [bestMove, bestMoveValue] = minimax(game, depth, Number.NEGATIVE_INFINITY, Number.POSITIVE_INFINITY, true, currSum, color);
          var d2 = new Date().getTime();
          return [bestMove, bestMoveValue];
        }

        function startGame(mode) {
            $('#ai-wins').text(aiWins);
            $('#ai-losses').text(aiLosses);
            if (mode === 'ai') {
                isAIMode = true;
                isHumanMode = false;
                $('#status').text('AI Mode: You are White, AI is Black. Make your move.');
            } else if (mode === 'human') {
                isAIMode = false;
                isHumanMode = true;
                $('#status').text('Human Mode: Both players are human. White moves first.');
            }
            $('#controls').show();
            board = Chessboard('board', {
                draggable: true,
                position: 'start',
                pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png',
                onDragStart: onDragStart,
                onDrop: onDrop,
                onSnapEnd: onSnapEnd
            });
        }

        $('#ai-mode').on('click', function() {
            startGame('ai');
        });

        $('#human-mode').on('click', function() {
            startGame('human');
        });

        function onDragStart(source, piece, position, orientation) {
            if (game.game_over()) return false;
            if ((game.turn() === 'w' && piece.search(/^b/) !== -1) ||
                (game.turn() === 'b' && piece.search(/^w/) !== -1)) {
                return false;
            }
        }

        function onDrop(source, target) {
            var move = game.move({
                from: source,
                to: target,
                promotion: 'q'
            });
            if (move === null) return 'snapback';
            globalSum = evaluateBoard(game, move, globalSum, 'b');
            board.position(game.fen());
            if (isAIMode && game.turn() === 'b') {
                setTimeout(makeAIMove, 500);
            }
            updateStatus();
        }

        function onSnapEnd() {
            board.position(game.fen());
        }

        function makeAIMove() {
            var move = getBestMove(game, 'b', globalSum)[0];
            globalSum = evaluateBoard(game, move, globalSum, 'b');
            game.move(move);
            board.position(game.fen());
            updateStatus();
        }

        function updateStatus() {
            if (game.in_checkmate()) {
                var winner = game.turn() === 'w' ? 'Black' : 'White';
                $('#status').text('Checkmate! ' + winner + ' wins.');
                if (isAIMode) {
                    if (winner === 'Black') {
                        aiWins++;
                        adjustWeights(1); // AI wins, increase weights
                    } else {
                        aiLosses++;
                        adjustWeights(-1); // AI loses, decrease weights
                    }
                    localStorage.setItem('aiWins', aiWins);
                    localStorage.setItem('aiLosses', aiLosses);
                    localStorage.setItem('weights', JSON.stringify(weights));
                }
            } else if (game.in_stalemate()) {
                $('#status').text('Stalemate! Draw.');
            } else if (game.in_draw()) {
                $('#status').text('Draw!');
            } else if (game.in_check()) {
                $('#status').text((game.turn() === 'w' ? 'White' : 'Black') + ' is in check.');
            } else {
                $('#status').text((game.turn() === 'w' ? 'White' : 'Black') + ' to move.');
            }
        }

        function adjustWeights(delta) {
            for (var piece in weights) {
                if (weights.hasOwnProperty(piece) && piece !== 'k' && piece !== 'k_e') {
                    weights[piece] += delta;
                }
            }
        }

        $('#undo').on('click', function() {
            game.undo();
            board.position(game.fen());
            updateStatus();
        });

        $('#redo').on('click', function() {
            // Simple redo, assuming last move
            // In full implementation, need stack
            alert('Redo not implemented fully');
        });

        $('#reset').on('click', function() {
            game.reset();
            globalSum = 0;
            board.start();
            $('#status').text('Game reset. Select a mode to start.');
            $('#controls').hide();
        });
