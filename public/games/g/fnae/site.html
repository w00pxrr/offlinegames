<html>
    <title>Five Nights at Epstein's</title>
    <link id="dynamic-favicon" rel="icon" type="image/png" href="resources/download.png">
    <script>
        function applyBrandMode() {
            const mode = localStorage.getItem("brandMode") || "normal";
            const favicon = document.getElementById("dynamic-favicon");

            if (mode === "alt") {
                document.title = "Dashboard";
                favicon.href = "resources/canvas.png?v=1";
            } else {
                document.title = "Home | Compass";
                favicon.href = "resources/download.png?v=1";
            }
        }
        applyBrandMode();
    </script>
  <style type="text/css"> 
        html { 
            overflow: auto; 
        } 
          
        html, 
        body, 
        div, 
        iframe { 
            margin: 0px; 
            padding: 0px; 
            height: 100%; 
            border: none; 
        } 
          
        iframe { 
            display: block; 
            width: 100%; 
            border: none; 
            overflow-y: auto; 
            overflow-x: hidden; 
        } 
    </style> 
  <iframe src="index.html" width="100%" height="100%" allowfullscreen frameborder="0"></iframe>
</html>
